<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASAC Bourgogne | Site officiel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-bg"></div>
    <header class="topbar">
      <div class="logo-wrap">
        <img
          class="logo-main"
          src="assets/logo-asa-prenois-bourgogne.png"
          onerror="this.onerror=null;this.src='assets/logo-asa-prenois-bourgogne.jpg';"
          alt="Logo ASA Prenois Bourgogne"
        />
      </div>
      <div class="topbar-right">
        <nav class="main-nav" aria-label="Navigation principale">
          <a href="#/accueil" data-nav="accueil">ACCUEIL</a>
          <a href="#/meetings" data-nav="meetings">LES MEETINGS</a>
          <a href="#/commissaires" data-nav="commissaires">COMMISSAIRES</a>
          <a href="#/pilotes" data-nav="pilotes">PILOTES</a>
          <a href="#/vie-asa" data-nav="vie-asa">LA VIE DE L'ASA</a>
          <a href="#/partenaires" data-nav="partenaires">LES PARTENAIRES</a>
          <a href="#/contact" data-nav="contact">CONTACTEZ-NOUS</a>
        </nav>
        <img
          class="logo-ffsa"
          src="assets/logo-ffsa.png"
          onerror="this.onerror=null;this.src='assets/logo-ffsa.jpg';"
          alt="Logo FFSA"
        />
      </div>
    </header>

    <main id="app"></main>

    <footer class="footer">
      <p>
        ASAC Bourgogne 2026. Base evolutive pour les parcours meetings pilote et
        commissaire.
      </p>
    </footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
